<script>
// ── YOUR EXACT BRAIN MESH CODE ────────────────────────────────────────────
// Only changes: canvas id is brainCanvas, events stopPropagation to protect dismiss
const brainCanvas = document.getElementById("brainCanvas");
const ctx = brainCanvas.getContext("2d");

let nodes = [];
let edges = [];
let selectedNode = null;
let improved = false;

const brainPath = new Path2D(`
  M150,260
  C130,200 180,120 300,110
  C420,100 520,120 600,160
  C680,200 700,260 680,320
  C660,355 630,372 595,375

  C578,376 562,372 550,362
  C538,352 532,338 535,325
  C538,312 548,304 560,306
  C572,308 580,320 578,333
  C576,342 568,350 558,350

  C570,358 582,368 582,380
  C582,392 572,402 560,404
  C548,406 538,398 536,386
  C534,374 542,363 554,362

  C540,370 520,376 500,376
  C475,376 450,370 430,360
  C415,352 408,340 410,328
  C412,316 422,308 434,310
  C446,312 452,324 448,336

  C444,348 432,356 420,354
  C405,352 395,340 396,327
  C397,314 408,305 420,306

  C428,360 420,375 410,385
  C402,393 392,396 382,392

  C490,400 510,415 515,435
  C518,452 515,472 512,495
  C508,515 505,525 500,528
  C495,525 492,515 488,495
  C485,472 482,452 485,435
  C488,415 468,405 450,400

  C300,400 260,390 230,360
  C200,330 190,300 170,300
  C150,300 140,280 150,260
  Z
`);

function reset(){
  nodes = [];
  edges = [];
  createNodes();
  createEdges();
}

function randomNodes(){
  while (nodes.length < 220) {
    let x = Math.random() * brainCanvas.width;
    let y = Math.random() * brainCanvas.height;
    if (ctx.isPointInPath(brainPath, x, y)) {
      nodes.push({ x, y, vx:0, vy:0 });
    }
  }
}

function improvedNodes(){
  const minDist = 18;
  function farEnough(x,y){
    return nodes.every(n => Math.hypot(n.x-x,n.y-y) > minDist);
  }
  let attempts = 0;
  while(nodes.length < 200 && attempts < 10000){
    let x = Math.random()*brainCanvas.width;
    let y = Math.random()*brainCanvas.height;
    if(ctx.isPointInPath(brainPath,x,y) && farEnough(x,y)){
      nodes.push({x,y,vx:0,vy:0});
    }
    attempts++;
  }
  for(let t=0; t<=1; t+=0.01){
    let x = 150 + 500*t;
    for(let y=100;y<450;y+=5){
      if(ctx.isPointInStroke(brainPath,x,y)){
        nodes.push({x,y,vx:0,vy:0});
      }
    }
  }
}

function createNodes(){
  if(improved) improvedNodes(); else randomNodes();
}

function createEdges() {
  const pts = nodes.map(n => [n.x, n.y]);
  const delaunay = Delaunator.from(pts);
  for (let i = 0; i < delaunay.triangles.length; i += 3) {
    let a = delaunay.triangles[i];
    let b = delaunay.triangles[i+1];
    let c = delaunay.triangles[i+2];
    addEdge(a,b); addEdge(b,c); addEdge(c,a);
  }
}

function addEdge(i,j){
  if (edges.some(e => (e.i===i && e.j===j)||(e.i===j && e.j===i))) return;
  let dx = nodes[i].x - nodes[j].x;
  let dy = nodes[i].y - nodes[j].y;
  edges.push({i,j,rest:Math.hypot(dx,dy)});
}

function update(){
  for (let e of edges){
    let a = nodes[e.i];
    let b = nodes[e.j];
    let dx = b.x - a.x;
    let dy = b.y - a.y;
    let dist = Math.hypot(dx,dy)||0.001;
    let f = (dist - e.rest)*0.02;
    let fx = dx/dist*f, fy = dy/dist*f;
    if(a!==selectedNode){a.vx+=fx;a.vy+=fy;}
    if(b!==selectedNode){b.vx-=fx;b.vy-=fy;}
  }
  for (let n of nodes){
    if(n!==selectedNode){
      n.x+=n.vx; n.y+=n.vy;
      n.vx*=0.85; n.vy*=0.85;
    }
  }
}

function draw(){
  ctx.clearRect(0,0,brainCanvas.width,brainCanvas.height);
  ctx.strokeStyle="#3c6e71"; ctx.globalAlpha=0.7;
  for(let e of edges){
    let a=nodes[e.i], b=nodes[e.j];
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }
  ctx.globalAlpha=1;
  for(let n of nodes){
    ctx.beginPath(); ctx.arc(n.x,n.y,6,0,Math.PI*2); // brain node size
    ctx.fillStyle="#284b63"; ctx.fill();
  }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }

// Brain events — stopPropagation prevents dismiss from firing
brainCanvas.addEventListener("mousedown", e=>{
  e.stopPropagation();
  const r = brainCanvas.getBoundingClientRect();
  const scaleX = brainCanvas.width / r.width;
  const scaleY = brainCanvas.height / r.height;
  const mx = (e.clientX - r.left) * scaleX;
  const my = (e.clientY - r.top) * scaleY;
  for(let n of nodes){ if(Math.hypot(n.x-mx,n.y-my)<8){ selectedNode=n; break; } }
});

brainCanvas.addEventListener("mousemove", e=>{
  if(selectedNode){
    const r = brainCanvas.getBoundingClientRect();
    const scaleX = brainCanvas.width / r.width;
    const scaleY = brainCanvas.height / r.height;
    selectedNode.x = (e.clientX - r.left) * scaleX;
    selectedNode.y = (e.clientY - r.top) * scaleY;
  }
});

brainCanvas.addEventListener("mouseup", ()=>selectedNode=null);
brainCanvas.addEventListener("mouseleave", ()=>selectedNode=null);
brainCanvas.addEventListener("click", e=>e.stopPropagation());

reset(); loop();


// ── YOUR EXACT CIPHER + LOADING CODE ─────────────────────────────────────
(function(){
  const TARGET = 'building models of the mind';
  const cipherEl = document.getElementById('cipher');
  const prsEl    = document.getElementById('prs');

  // Build letter spans
  function buildNeuralText() {
    let html = '';
    for (let i = 0; i < TARGET.length; i++) {
      if (TARGET[i] === ' ') html += '<span style="display:inline-block;width:0.4em"></span>';
      else html += `<span class="neural-char" data-idx="${i}">${TARGET[i]}</span>`;
    }
    cipherEl.innerHTML = html;
  }

  function jitter(el) {
    const x = (Math.random() - 0.5) * 2;
    const y = (Math.random() - 0.5) * 2;
    const r = (Math.random() - 0.5) * 2;
    el.style.transform = `translate(${x}px,${y}px) rotate(${r}deg)`;
    setTimeout(()=>el.style.transform='translate(0,0) rotate(0deg)',80);
  }

  // Fire letters sequentially with depth, glow, and breathing
  function fireNeuron(idx){
    const spans = cipherEl.querySelectorAll('.neural-char');
    if(idx >= spans.length){
      setTimeout(startTracer, 400);
      return;
    }
    const span = spans[idx];
    span.classList.add('active');

    // 3D depth: closer = bigger, farther = smaller
    const depthScale = 1 + Math.random()*0.12;
    const depthOffsetY = (Math.random() - 0.5) * 3;
    const depthZ = Math.random(); // 0 = far, 1 = close

    // Apply depth transform
    span.style.transform = `scale(${depthScale}) translateY(${depthOffsetY}px)`;

    // Layered sparks with depth-based size/speed
    const sparkCount = 3 + Math.floor(Math.random() * 2);
    for(let i=0; i<sparkCount; i++){
      const p = document.createElement('div');
      p.className='spark-particle';
      const r = span.getBoundingClientRect();
      
      // Position with spread
      const angle = Math.random() * Math.PI * 2;
      const dist = 8 + Math.random() * 12;
      p.style.left = (r.left + r.width/2 + Math.cos(angle)*dist) + 'px';
      p.style.top = (r.top + r.height/2 + Math.sin(angle)*dist*0.6) + 'px';
      
      // Depth affects size: closer = bigger
      const sparkScale = 0.6 + (depthZ * 0.8) + Math.random()*0.4;
      p.style.width = (2 * sparkScale) + 'px';
      p.style.height = (2 * sparkScale) + 'px';
      p.style.opacity = 0.6 + (depthZ * 0.3);
      
      document.body.appendChild(p);
      
      // Animate out
      p.animate([
        { transform: 'scale(1)', opacity: p.style.opacity },
        { transform: `scale(${sparkScale*0.3})`, opacity: 0 }
      ], { duration: 500 + Math.random()*300, easing: 'ease-out' }).onfinish = () => p.remove();
    }

    // Breathing animation during active state
    span.animate([
      { transform: `scale(${depthScale}) translateY(${depthOffsetY}px)` },
      { transform: `scale(${depthScale*1.04}) translateY(${depthOffsetY-1}px)` },
      { transform: `scale(${depthScale}) translateY(${depthOffsetY}px)` }
    ], { duration: 350, easing: 'ease-in-out' });

    // Faster letter firing - shorter delay
    setTimeout(()=>{
      span.classList.remove('active');
      span.classList.add('fired');
      // Keep subtle depth in fired state instead of resetting to flat
      span.style.transform = `scale(${0.98 + Math.random()*0.04}) translateY(${(Math.random()-0.5)}px)`;
      span.style.textShadow = '0 0 3px rgba(242,190,92,0.4), 0 0 8px rgba(242,190,92,0.25)';
      fireNeuron(idx+1);
    }, 120);
  }

  // Tracer dot along letters
  function startTracer(){
    const spans = cipherEl.querySelectorAll('.neural-char');
    if(spans.length===0) return;

    const dot = document.createElement('div');
    dot.className='tracer-dot';
    document.body.appendChild(dot);

    const letterPaths = spans.map(span=>{
      const r = span.getBoundingClientRect();
      const path = [];
      const steps = 10; // fewer steps = faster
      for(let i=0;i<steps;i++){
        path.push({
          x: r.left + r.width*(i/steps),
          y: r.top + r.height/2 + (Math.random()-0.5)*6
        });
      }
      return { span, path, rect:r };
    });

    let letterIdx = 0, pointIdx = 0, dir=1;

    function animate(){
      const letter = letterPaths[letterIdx];
      if(!letter) return;

      const point = letter.path[pointIdx];
      dot.style.left = (point.x - 1.5) + 'px';
      dot.style.top  = (point.y - 1.5) + 'px';

      // occasional mid-spark
      if(Math.random()>0.4){
        const spark = document.createElement('div');
        spark.className='trail-particle';
        spark.style.left = point.x + (Math.random()-0.5)*6 + 'px';
        spark.style.top  = point.y + (Math.random()-0.5)*6 + 'px';
        document.body.appendChild(spark);
        setTimeout(()=>spark.remove(), 500 + Math.random()*200);
      }

      pointIdx += 1;
      if(pointIdx >= letter.path.length){
        pointIdx = 0;
        letterIdx = (letterIdx + dir + letterPaths.length) % letterPaths.length;
        if(letterIdx === 0 || letterIdx === letterPaths.length-1) dir *= -1;
      }

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);

    // Stop tracer if exiting
    window.addEventListener('dismissTracer', ()=>{
      dot.remove();
    });
  }

  // Canvas-based pixel tracer - traces actual letter shapes
  function startCanvasTracer(){
    const spans = cipherEl.querySelectorAll('.neural-char');
    if(spans.length===0) return;

    const dot = document.createElement('div');
    dot.className='tracer-dot';
    dot.style.width = '2px';
    dot.style.height = '2px';
    dot.style.boxShadow = '0 0 6px 2px rgba(255,255,255,0.9), 0 0 12px 4px rgba(255,255,255,0.5)';
    document.body.appendChild(dot);

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    function getLetterPath(char, w, h) {
      canvas.width = w;
      canvas.height = h;
      ctx.clearRect(0, 0, w, h);
      ctx.font = window.getComputedStyle(spans[0]).font;
      ctx.fillStyle = '#fff';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';
      ctx.fillText(char, w/2, h/2);
      
      const imageData = ctx.getImageData(0, 0, w, h);
      const pixels = imageData.data;
      const points = [];
      
      for (let y = 0; y < h; y += 2) {
        for (let x = 0; x < w; x += 2) {
          const idx = (y * w + x) * 4;
          if (pixels[idx + 3] > 100) points.push({x, y});
        }
      }
      
      if (points.length === 0) return [];
      
      // Sort by distance from center to get outline-ish path
      const cx = w/2, cy = h/2;
      points.sort((a, b) => Math.hypot(a.x-cx, a.y-cy) - Math.hypot(b.x-cx, b.y-cy));
      
      // Build connected path
      const path = [points[0]];
      const used = new Set([`0,0`]);
      
      while (path.length < points.length && path.length < 50) {
        const last = path[path.length - 1];
        let best = null, bestDist = Infinity;
        
        for (const p of points) {
          const key = `${p.x},${p.y}`;
          if (used.has(key)) continue;
          const d = Math.hypot(p.x - last.x, p.y - last.y);
          if (d < bestDist && d < 10) {
            bestDist = d;
            best = p;
          }
        }
        
        if (best) {
          path.push(best);
          used.add(`${best.x},${best.y}`);
        } else break;
      }
      
      return path;
    }

    function spawnTracerSpark(x, y) {
      const p = document.createElement('div');
      p.className = 'spark-particle';
      // Sparks exactly at tracer position - minimal offset
      const offsetX = (Math.random()-0.5)*2;
      const offsetY = (Math.random()-0.5)*2;
      p.style.left = (x + offsetX) + 'px';
      p.style.top = (y + offsetY) + 'px';
      const scale = 0.5 + Math.random() * 0.8;
      p.style.width = (3 * scale) + 'px';
      p.style.height = (3 * scale) + 'px';
      document.body.appendChild(p);
      p.animate([
        { transform: 'scale(1)', opacity: 0.8 },
        { transform: `scale(${scale*0.2})`, opacity: 0 }
      ], { duration: 400 + Math.random()*200, easing: 'ease-out' }).onfinish = () => p.remove();
    }

    function spawnGlow(x, y) {
      if (!dot.glow) {
        const g = document.createElement('div');
        g.className = 'glow-tail';
        g.style.left = (x - 1.5) + 'px';
        g.style.top = (y - 1.5) + 'px';
        document.body.appendChild(g);
        dot.glow = g;
      } else {
        dot.glow.style.left = (x - 1.5) + 'px';
        dot.glow.style.top = (y - 1.5) + 'px';
      }
    }

    // Build all letter paths and connect them into one continuous path
    const letterPaths = [];
    spans.forEach(span => {
      const r = span.getBoundingClientRect();
      const path = getLetterPath(span.textContent, Math.ceil(r.width), Math.ceil(r.height));
      letterPaths.push({ path, rect: r });
    });

    // Build continuous connected path with interpolation between letters
    let continuousPath = [];
    for (let i = 0; i < letterPaths.length; i++) {
      const letter = letterPaths[i];
      const nextLetter = letterPaths[(i + 1) % letterPaths.length];
      
      // Add current letter's path
      letter.path.forEach(pt => {
        continuousPath.push({
          x: letter.rect.left + pt.x,
          y: letter.rect.top + pt.y
        });
      });
      
      // Add interpolation points to next letter (smooth connection)
      if (nextLetter && nextLetter.path.length > 0) {
        const lastPt = {
          x: letter.rect.left + letter.path[letter.path.length - 1].x,
          y: letter.rect.top + letter.path[letter.path.length - 1].y
        };
        const firstNextPt = {
          x: nextLetter.rect.left + nextLetter.path[0].x,
          y: nextLetter.rect.top + nextLetter.path[0].y
        };
        
        // Add 3 interpolation points for smooth transition
        for (let t = 0.25; t < 1; t += 0.25) {
          continuousPath.push({
            x: lastPt.x + (firstNextPt.x - lastPt.x) * t,
            y: lastPt.y + (firstNextPt.y - lastPt.y) * t
          });
        }
      }
    }

    let currentIdx = 0;
    let direction = 1;
    let running = true;

    function animate() {
      if (!running) return;
      
      const point = continuousPath[currentIdx];
      dot.style.left = (point.x - 1) + 'px';
      dot.style.top = (point.y - 1) + 'px';
      spawnGlow(point.x, point.y);

      // Sparks synced with tracer - spawn every frame with the dot
      spawnTracerSpark(point.x, point.y);

      currentIdx += direction * 2;
      
      if (currentIdx >= continuousPath.length || currentIdx < 0) {
        direction *= -1;
        currentIdx = direction > 0 ? 0 : continuousPath.length - 1;
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener('dismissTracer', () => { 
      running = false; 
      if (dot.glow) dot.glow.remove();
      dot.remove(); 
    });
    requestAnimationFrame(animate);
  }

  // Loading bar
  const bfill=document.getElementById('bfill'), blbl=document.getElementById('blbl');
  let p=0;
  setTimeout(()=>{
    const iv=setInterval(()=>{
      p=Math.min(100,p+Math.floor(Math.random()*2)+2);
      bfill.style.width=p+'%';
      blbl.textContent=p<100?'loading... '+p+'%':'ready';
      if(p>=100){
        clearInterval(iv);
        prsEl.classList.add('show');
        setTimeout(() => prsEl.classList.add('pulse'), 650);
      }
    },100);
  },300);

  // Dismiss handler - pulse brain, fade to black, blink reveal
  function dismiss(){
    const brainSlot = document.getElementById('brain-slot');
    const overlay = document.getElementById('transition-overlay');
    
    // Pulse the brain
    brainSlot.classList.add('pulse');
    
    // Start eyelid blink immediately (covers screen fully)
    setTimeout(() => {
      overlay.classList.add('blink');
    }, 400);
    
    // Navigate to hub after blink completes
    setTimeout(() => {
      window.location.replace('hub.html');
    }, 1200);
  }
  
  document.body.addEventListener('keydown', function handleStart(e){
    if(e.key.toLowerCase() === 's'){
      dismiss();
      document.body.removeEventListener('keydown', handleStart);
    }
  });

  buildNeuralText();
  setTimeout(()=>{
    fireNeuron(0);
    startCanvasTracer(); // Start simultaneously with letter firing
  }, 300);
})();
</script>
