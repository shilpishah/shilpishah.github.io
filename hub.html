<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Hub</title>
<style>
  /* Local Bitcount Ink font - prevents Google Fonts color palette issue */
  @font-face {
    font-family: 'Bitcount Ink';
    src: url('../../../Bitcount_Ink/BitcountInk-VariableFont_CRSV,ELSH,ELXP,SZP1,SZP2,XPN1,XPN2,YPN1,YPN2,slnt,wght.ttf') format('truetype');
    font-weight: 100 900;
    font-display: swap;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #04060e;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Bitcount Ink', monospace;
    /* TODO: Replace with hand-drawn neural environment background */
  }
  /* Deep atmospheric gradient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background: 
      radial-gradient(ellipse at 30% 20%, rgba(50,67,115,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(242,190,92,0.08) 0%, transparent 40%),
      #04060e;
    pointer-events: none;
  }
  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 40;
    pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.05) 3px, rgba(0,0,0,0.05) 4px);
  }
  #hubCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 10;
  }
  /* Ambient context text */
  .ambient-text {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 0.35em;
    color: rgba(139,155,180,0.4);
    z-index: 20;
    pointer-events: none;
    text-align: center;
  }
  /* Navigation hint */
  .nav-hint {
    position: fixed;
    bottom: 30px;
    right: 30px;
    font-size: 8px;
    letter-spacing: 0.25em;
    color: rgba(60,110,113,0.5);
    z-index: 20;
    pointer-events: none;
  }
  /* Title container with scramble animation */
  #title-container {
    position: fixed;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 30;
    pointer-events: none;
  }
  #main-title {
    font-family: 'Bitcount Ink', monospace;
    font-size: 18px;
    letter-spacing: 0.5em;
    /* Force yellow/orange color - override font palette */
    background: linear-gradient(180deg, #F2BE5C 0%, #F2A25C 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-palette: none;
    forced-color-adjust: none;
    text-shadow: none;
    filter: drop-shadow(0 0 8px rgba(242,190,92,0.6)) drop-shadow(0 0 20px rgba(242,190,92,0.3));
    margin-bottom: 8px;
  }
  #main-title .scramble-char {
    display: inline-block;
    min-width: 0.6em;
  }
  #subtitle {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(139,155,180,0.6);
  }
</style>
</head>
<body>
<!-- TODO: Replace node visuals with hand-drawn assets -->
<!-- TODO: Replace with hand-drawn neural environment background -->
<!-- TODO: Add hand-drawn player avatar silhouette if needed -->

<canvas id="hubCanvas"></canvas>

<!-- Title with scramble animation -->
<div id="title-container">
  <div id="main-title">SHILPI SHAH</div>
  <div id="subtitle">[ cognitive interface ]</div>
</div>

<div class="ambient-text">navigating internal systems...</div>
<div class="nav-hint">◄ A / D ►</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.2.4/pixi.min.js"></script>
<script src="hub.js" defer></script>
</body>
</html>
