    color: #8b9bb4;

  body::before {
    content: '';

  }

    font-size: 32px;
    color: #4ecdc4;
    margin-bottom: 10px;
    letter-spacing: 0.2em;

    letter-spacing: 0.3em;
    margin-bottom: 50px;
  }
  .content {
    font-size: 14px;
    line-height: 1.8;
  }
  .content p {

  }
  .neural-divider {
